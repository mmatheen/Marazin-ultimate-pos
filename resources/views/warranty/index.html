<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clean Cart Layout</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .cart-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .cart-header {
      background: #f1f3f5;
      padding: 16px 24px;
      font-weight: 600;
      display: grid;
      grid-template-columns: 40px 3fr 100px 90px 110px 120px 40px;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid #dee2e6;
      font-size: 0.95rem;
      color: #495057;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 40px 3fr 100px 90px 110px 120px 40px;
      gap: 16px;
      padding: 20px 24px;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-name {
      font-weight: 600;
      color: #212529;
      font-size: 1.05rem;
    }

    .sku {
      font-size: 0.88rem;
      color: #6c757d;
    }

    .mrp {
      font-size: 0.92rem;
      color: #e63946;
      font-weight: 600;
    }

    .quantity {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .qty-btn:hover {
      background: #e9ecef;
    }

    .qty-display {
      width: 40px;
      text-align: center;
      font-weight: 500;
    }

    .price, .subtotal {
      text-align: right;
      font-weight: 500;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #dc3545;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
    }

    .delete-btn:hover {
      color: #c82333;
    }

    @media (max-width: 768px) {
      .cart-header, .cart-item {
        grid-template-columns: 50px 2fr 1fr;
        gap: 12px;
        padding: 16px;
      }

      .cart-header > *:nth-child(n+4),
      .cart-item > *:nth-child(n+4) {
        display: none;
      }

      .product-info {
        grid-column: 2;
      }

      .quantity {
        grid-column: 3;
        justify-content: flex-end;
      }

      .subtotal {
        grid-column: 3;
        text-align: right;
        font-weight: 600;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>

<div class="cart-container">

  <!-- Header -->
  <div class="cart-header">
    <div>#</div>
    <div>Product</div>
    <div>Quantity</div>
    <div>Discount</div>
    <div>Unit Price</div>
    <div>Subtotal</div>
    <div></div>
  </div>

  <!-- Item 1 -->
  <div class="cart-item">
    <div>1</div>

    <div class="product-info">
      <div class="product-name">Rainbow Baby Easy Chair No:01</div>
      <div class="sku">SKU: 0614  |  110 pcs available (Max: 110)</div>
      <div class="mrp">MRP: 895.00</div>
    </div>

    <div class="quantity">
      <button class="qty-btn">-</button>
      <div class="qty-display">1</div>
      <button class="qty-btn">+</button>
    </div>

    <div>0 <small>(0.00%)</small></div>
    <div class="price">895.00</div>
    <div class="subtotal">895.00</div>
    <button class="delete-btn">🗑</button>
  </div>

  <!-- Item 2 -->
  <div class="cart-item">
    <div>2</div>

    <div class="product-info">
      <div class="product-name">GreenChef Gas Stove Double Chandini</div>
      <div class="sku">SKU: 5596  |  48 pcs available (Max: 48)</div>
      <div class="mrp">MRP: 8,750.00</div>
    </div>

    <div class="quantity">
      <button class="qty-btn">-</button>
      <div class="qty-display">1</div>
      <button class="qty-btn">+</button>
    </div>

    <div>0 <small>(0.00%)</small></div>
    <div class="price">8,750.00</div>
    <div class="subtotal">8,750.00</div>
    <button class="delete-btn">🗑</button>
  </div>

</div>

</body>
</html>
